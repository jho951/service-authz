server:
  port: 8084
spring:
  application:
    name: authz-service
  datasource:
    url: jdbc:h2:mem:permission;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT_MS:1000ms}
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
  info:
    title: Authz Service API
    version: 0.1.0
    description: Internal admin permission verification service for gateway.

auditlog:
  enabled: ${AUDITLOG_ENABLED:true}
  service-name: ${AUDITLOG_SERVICE_NAME:${spring.application.name}}
  env: ${AUDITLOG_ENV:local}
  file-path: ${AUDITLOG_FILE_PATH:./logs/audit.log}
  async-enabled: ${AUDITLOG_ASYNC_ENABLED:true}
  async-thread-count: ${AUDITLOG_ASYNC_THREAD_COUNT:2}
  async-queue-capacity: ${AUDITLOG_ASYNC_QUEUE_CAPACITY:1000}

permission:
  internal-request-secret: ${PERMISSION_INTERNAL_REQUEST_SECRET:}
  cache:
    prefix: ${PERMISSION_CACHE_PREFIX:perm:}
    local-ttl-seconds: ${PERMISSION_CACHE_L1_TTL_SECONDS:5}
    redis-ttl-seconds: ${PERMISSION_CACHE_L2_TTL_SECONDS:60}
