services:
  authz-service:
    image: ${AUTHZ_SERVICE_IMAGE:?AUTHZ_SERVICE_IMAGE is required}
    pull_policy: always
    restart: always
    ports:
      - "${AUTHZ_SERVICE_HOST_BIND:?AUTHZ_SERVICE_HOST_BIND is required}:${AUTHZ_SERVICE_HOST_PORT:-8084}:8084"
    expose:
      - "8084"
    env_file:
      - path: ../../.env.prod
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${AUTHZ_SPRING_DATASOURCE_URL:?AUTHZ_SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${AUTHZ_SPRING_DATASOURCE_USERNAME:?AUTHZ_SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${AUTHZ_SPRING_DATASOURCE_PASSWORD:?AUTHZ_SPRING_DATASOURCE_PASSWORD is required}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${AUTHZ_SPRING_DATASOURCE_DRIVER_CLASS_NAME:-com.mysql.cj.jdbc.Driver}
      PERMISSION_INTERNAL_REQUEST_SECRET: ${PERMISSION_INTERNAL_REQUEST_SECRET:?PERMISSION_INTERNAL_REQUEST_SECRET is required}
      AUTHZ_INTERNAL_JWT_SECRET: ${AUTHZ_INTERNAL_JWT_SECRET:?AUTHZ_INTERNAL_JWT_SECRET is required}
      REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required}
      PLATFORM_SECURITY_JWT_SECRET: ${PLATFORM_SECURITY_JWT_SECRET:?PLATFORM_SECURITY_JWT_SECRET is required}
      PLATFORM_GOVERNANCE_AUDIT_SERVICE_NAME: ${AUTHZ_PLATFORM_GOVERNANCE_AUDIT_SERVICE_NAME:-authz-service}
      PLATFORM_GOVERNANCE_AUDIT_ENVIRONMENT: ${AUTHZ_PLATFORM_GOVERNANCE_AUDIT_ENVIRONMENT:-prod}
      PLATFORM_SECURITY_SERVICE_ROLE_PRESET: ${AUTHZ_PLATFORM_SECURITY_SERVICE_ROLE_PRESET:-INTERNAL_SERVICE}
      PLATFORM_SECURITY_IP_GUARD_ENABLED: ${PLATFORM_SECURITY_IP_GUARD_ENABLED:-true}
      PLATFORM_SECURITY_INTERNAL_ALLOW_CIDRS: ${PLATFORM_SECURITY_INTERNAL_ALLOW_CIDRS:?PLATFORM_SECURITY_INTERNAL_ALLOW_CIDRS is required}
      PLATFORM_SECURITY_RATE_LIMIT_ENABLED: ${AUTHZ_PLATFORM_SECURITY_RATE_LIMIT_ENABLED:-false}
    networks:
      service-shared:
        aliases:
          - authz-service
